name: CI/CD Pipeline

on:
  push:
    branches: [ main, mastra ]
  pull_request:
    branches: [ main, mastra ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Run type check
      run: npx tsc --noEmit

    - name: Run tests
      run: npm test

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.node-version == '20.x'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info

    - name: Build application
      run: npm run build

    - name: Start application (smoke test)
      run: |
        npm run start &
        sleep 10
        curl -f http://localhost:3000 || exit 1
        pkill -f "next start"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production..."
        echo "📝 Add your deployment commands here"
        echo "Examples:"
        echo "  - Deploy to Vercel: vercel --prod"
        echo "  - Deploy to Netlify: netlify deploy --prod"
        echo "  - Deploy to AWS: aws s3 sync ./out s3://your-bucket"
        echo "  - Deploy to Docker: docker build and push"